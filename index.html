<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #151515;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --accent2: #e05a3a;
    --text: #f0ede8;
    --muted: #666;
    --string1: #c9a84c;
    --string2: #b8b8b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 10vw, 96px);
    letter-spacing: 0.08em;
    line-height: 0.9;
    color: var(--accent);
    text-shadow: 4px 4px 0 #7a5c00;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .category-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 16px;
    padding-left: 4px;
    border-left: 3px solid var(--accent2);
    padding-left: 12px;
  }

  .category {
    margin-bottom: 40px;
    width: 100%;
    max-width: 900px;
  }

  .chord-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .chord-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 14px 12px;
    cursor: pointer;
    transition: all 0.08s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    min-width: 100px;
  }

  .chord-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.08s;
  }

  .chord-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232, 200, 74, 0.12);
  }

  .chord-card:active, .chord-card.playing {
    transform: scale(0.96);
  }

  .chord-card.playing::before { opacity: 0.07; }

  .chord-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 1;
    position: relative;
  }

  .chord-type {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
    position: relative;
  }

  .fretboard {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 10px;
    position: relative;
  }

  .string-row {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .string-label {
    font-size: 9px;
    color: var(--muted);
    width: 12px;
    text-align: right;
  }

  .fret-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fret-dot.open {
    border-color: #444;
  }

  .fret-dot.pressed {
    background: var(--accent);
    border-color: var(--accent);
  }

  .fret-dot.muted {
    border-color: transparent;
    background: transparent;
  }

  .muted-x {
    font-size: 9px;
    color: var(--muted);
    line-height: 1;
  }

  /* Ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid var(--accent);
    pointer-events: none;
    animation: rippleOut 0.6s ease-out forwards;
    z-index: 999;
  }

  @keyframes rippleOut {
    from { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%); }
    to { width: 120px; height: 120px; opacity: 0; transform: translate(-50%, -50%); }
  }

  /* Waveform display */
  .waveform-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    height: 20px;
  }

  .wave-segment {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    height: 4px;
    transition: height 0.1s;
  }

  .now-playing {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    padding: 10px 24px;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
  }

  .now-playing.visible { opacity: 1; }

  .strum-mode {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle-btn {
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .toggle-btn.active {
    background: var(--accent);
    color: #000;
  }
</style>
</head>
<body>

<header>
  <h1>CHORD<br>PLAY</h1>
  <p class="subtitle">click any chord to hear it</p>
</header>

<div class="strum-mode">
  <span>Mode</span>
  <div class="toggle">
    <button class="toggle-btn active" id="btn-strum" onclick="setMode('strum')">Strum</button>
    <button class="toggle-btn" id="btn-arp" onclick="setMode('arp')">Arpeggio</button>
    <button class="toggle-btn" id="btn-single" onclick="setMode('single')">Single</button>
  </div>
</div>

<div id="categories"></div>

<div class="now-playing" id="nowPlaying"></div>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function ensureCtx() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
}

// Guitar string open tuning (Hz): E2, A2, D3, G3, B3, E4
const OPEN_STRINGS = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63];

// Chords: fret positions per string [E A D G B e], -1 = muted
const CHORDS = {
  'Major': [
    { name: 'E',  type: 'Major',   frets: [0,2,2,1,0,0] },
    { name: 'A',  type: 'Major',   frets: [-1,0,2,2,2,0] },
    { name: 'D',  type: 'Major',   frets: [-1,-1,0,2,3,2] },
    { name: 'G',  type: 'Major',   frets: [3,2,0,0,0,3] },
    { name: 'C',  type: 'Major',   frets: [-1,3,2,0,1,0] },
    { name: 'F',  type: 'Major',   frets: [1,1,3,3,3,1] },
    { name: 'B',  type: 'Major',   frets: [-1,2,4,4,4,2] },
  ],
  'Minor': [
    { name: 'Em', type: 'Minor',   frets: [0,2,2,0,0,0] },
    { name: 'Am', type: 'Minor',   frets: [-1,0,2,2,1,0] },
    { name: 'Dm', type: 'Minor',   frets: [-1,-1,0,2,3,1] },
    { name: 'Gm', type: 'Minor',   frets: [3,5,5,3,3,3] },  // barre
    { name: 'Bm', type: 'Minor',   frets: [-1,2,4,4,3,2] },
    { name: 'Cm', type: 'Minor',   frets: [-1,3,5,5,4,3] },
  ],
  '7th': [
    { name: 'G7', type: '7th',     frets: [3,2,0,0,0,1] },
    { name: 'C7', type: '7th',     frets: [-1,3,2,3,1,0] },
    { name: 'D7', type: '7th',     frets: [-1,-1,0,2,1,2] },
    { name: 'E7', type: '7th',     frets: [0,2,0,1,0,0] },
    { name: 'A7', type: '7th',     frets: [-1,0,2,0,2,0] },
    { name: 'B7', type: '7th',     frets: [-1,2,1,2,0,2] },
  ],
  'Special': [
    { name: 'Cadd9', type: 'Add9', frets: [-1,3,2,0,3,3] },
    { name: 'Dsus2', type: 'Sus2', frets: [-1,-1,0,2,3,0] },
    { name: 'Asus4', type: 'Sus4', frets: [-1,0,2,2,3,0] },
    { name: 'Esus4', type: 'Sus4', frets: [0,2,2,2,0,0] },
    { name: 'Am7',   type: 'Min7', frets: [-1,0,2,0,1,0] },
    { name: 'Fmaj7', type: 'Maj7', frets: [-1,-1,3,2,1,0] },
  ]
};

function fretToFreq(stringIdx, fret) {
  return OPEN_STRINGS[stringIdx] * Math.pow(2, fret / 12);
}

function playNote(freq, startTime, duration, vol = 0.4) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  filter.type = 'lowpass';
  filter.frequency.value = 3000;
  filter.Q.value = 1;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, startTime);

  // Slight detune for richness
  const osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq, startTime);
  osc2.detune.setValueAtTime(5, startTime);
  osc2.connect(gain);

  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.005);
  gain.gain.exponentialRampToValueAtTime(vol * 0.4, startTime + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  osc.connect(filter);
  osc2.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start(startTime);
  osc.stop(startTime + duration);
  osc2.start(startTime);
  osc2.stop(startTime + duration);
}

let currentMode = 'strum';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
}

function playChord(chord, el) {
  ensureCtx();
  const now = ctx.currentTime;
  const strings = chord.frets;

  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 300);

  if (currentMode === 'strum') {
    strings.forEach((fret, i) => {
      if (fret === -1) return;
      const freq = fretToFreq(i, fret);
      playNote(freq, now + i * 0.025, 2.2, 0.28);
    });
  } else if (currentMode === 'arp') {
    const active = strings.map((f,i) => ({f,i})).filter(x => x.f !== -1);
    active.forEach(({f,i}, idx) => {
      const freq = fretToFreq(i, f);
      playNote(freq, now + idx * 0.12, 1.8, 0.32);
    });
  } else {
    // Single - just root note
    const root = strings.find(f => f !== -1);
    const rootIdx = strings.findIndex(f => f !== -1);
    if (root !== undefined) playNote(fretToFreq(rootIdx, root), now, 1.5, 0.45);
  }

  showNowPlaying(chord.name);
}

let npTimeout;
function showNowPlaying(name) {
  const el = document.getElementById('nowPlaying');
  el.textContent = '♪  ' + name;
  el.classList.add('visible');
  clearTimeout(npTimeout);
  npTimeout = setTimeout(() => el.classList.remove('visible'), 2000);
}

function makeRipple(e) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

function buildFretboard(frets) {
  const stringNames = ['E','A','D','G','B','e'];
  const mini = document.createElement('div');
  mini.className = 'fretboard';
  frets.forEach((fret, i) => {
    const row = document.createElement('div');
    row.className = 'string-row';
    const lbl = document.createElement('span');
    lbl.className = 'string-label';
    lbl.textContent = stringNames[i];
    row.appendChild(lbl);

    if (fret === -1) {
      const dot = document.createElement('div');
      dot.className = 'fret-dot muted';
      const x = document.createElement('span');
      x.className = 'muted-x';
      x.textContent = '×';
      dot.appendChild(x);
      row.appendChild(dot);
    } else {
      const maxFret = Math.max(...frets.filter(f => f !== -1)) || 1;
      for (let f = 0; f <= Math.min(maxFret, 4); f++) {
        const dot = document.createElement('div');
        dot.className = 'fret-dot' + (fret === f && fret > 0 ? ' pressed' : fret === 0 && f === 0 ? ' open' : '');
        row.appendChild(dot);
      }
    }
    mini.appendChild(row);
  });
  return mini;
}

function renderAll() {
  const container = document.getElementById('categories');
  Object.entries(CHORDS).forEach(([cat, chords]) => {
    const section = document.createElement('div');
    section.className = 'category';

    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat;
    section.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'chord-grid';

    chords.forEach(chord => {
      const card = document.createElement('div');
      card.className = 'chord-card';

      const name = document.createElement('div');
      name.className = 'chord-name';
      name.textContent = chord.name;

      const type = document.createElement('div');
      type.className = 'chord-type';
      type.textContent = chord.type;

      card.appendChild(name);
      card.appendChild(type);
      card.appendChild(buildFretboard(chord.frets));

      card.addEventListener('click', (e) => {
        playChord(chord, card);
        makeRipple(e);
      });

      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

renderAll();
</script>
</body>
</html>
