<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrument Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #151515;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --accent2: #e05a3a;
    --text: #f0ede8;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 80px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #181818 39px, #181818 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #181818 39px, #181818 40px);
  }

  header { text-align: center; margin-bottom: 36px; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 88px);
    letter-spacing: 0.1em;
    line-height: 0.9;
    color: var(--accent);
    text-shadow: 3px 3px 0 #7a5c00;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Instrument tabs */
  .instrument-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px;
  }

  .tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab .icon { font-size: 16px; }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #000; }

  /* Mode toggles */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle-btn {
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .toggle-btn.active { background: var(--accent); color: #000; }

  /* Panel */
  .panel { display: none; width: 100%; max-width: 960px; }
  .panel.active { display: block; }

  /* Chord grid (guitar/ukulele) */
  .category { margin-bottom: 36px; }

  .category-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 14px;
    border-left: 3px solid var(--accent2);
    padding-left: 12px;
  }

  .chord-grid { display: flex; flex-wrap: wrap; gap: 14px; }

  .chord-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 12px 10px;
    cursor: pointer;
    transition: all 0.08s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    min-width: 90px;
  }

  .chord-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.08s;
  }

  .chord-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,200,74,0.1); }
  .chord-card:active, .chord-card.playing { transform: scale(0.96); }
  .chord-card.playing::before { opacity: 0.08; }

  .chord-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 1;
    position: relative;
  }

  .chord-type {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 3px;
    position: relative;
  }

  .fretboard { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
  .string-row { display: flex; align-items: center; gap: 3px; }
  .string-label { font-size: 8px; color: var(--muted); width: 10px; text-align: right; }

  .fret-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
  }

  .fret-dot.pressed { background: var(--accent); border-color: var(--accent); }
  .fret-dot.muted { border-color: transparent; }
  .muted-x { font-size: 8px; color: var(--muted); }

  /* ---- PIANO ---- */
  .piano-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .piano-keys {
    position: relative;
    display: flex;
    height: 160px;
    user-select: none;
  }

  .white-key {
    width: 44px;
    height: 160px;
    background: #f5f0e8;
    border: 1px solid #bbb;
    border-radius: 0 0 6px 6px;
    cursor: pointer;
    position: relative;
    transition: background 0.06s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
  }

  .white-key:hover { background: #fffde0; }
  .white-key.playing { background: var(--accent); }

  .white-key .key-label {
    font-size: 9px;
    color: #999;
    letter-spacing: 0.05em;
    font-family: 'Space Mono', monospace;
  }

  .white-key.playing .key-label { color: #000; }

  .black-key {
    width: 28px;
    height: 100px;
    background: #111;
    border: 1px solid #000;
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    position: absolute;
    top: 0;
    z-index: 2;
    transition: background 0.06s;
  }

  .black-key:hover { background: #333; }
  .black-key.playing { background: var(--accent2); }

  .piano-chords {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 800px;
  }

  .piano-chord-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.08s;
  }

  .piano-chord-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .piano-chord-btn.playing { background: var(--accent); color: #000; transform: scale(0.96); }

  .piano-section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 4px;
  }

  /* ---- OMNICHORD ---- */
  .omni-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .omni-hint {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  .omni-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }

  .omni-chords {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    flex-shrink: 0;
  }

  .omni-chord-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.1s;
    text-align: center;
    min-width: 70px;
  }

  .omni-chord-btn .sub {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .omni-chord-btn:hover { border-color: var(--accent); color: var(--accent); }
  .omni-chord-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
  .omni-chord-btn.selected .sub { color: #333; }

  .omni-strumplate {
    flex: 1;
    min-width: 160px;
    max-width: 220px;
    background: #1a1208;
    border: 2px solid #3a2a10;
    border-radius: 12px;
    padding: 16px 12px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    cursor: ns-resize;
    user-select: none;
  }

  .omni-strum-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    color: #7a5c20;
  }

  .omni-strum-sub {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #4a3a10;
    margin-top: -6px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
  }

  .omni-strings {
    display: flex;
    gap: 6px;
    align-items: stretch;
    height: 260px;
    width: 100%;
    padding: 0 8px;
  }

  .omni-string-line {
    flex: 1;
    border-radius: 2px;
    transition: background 0.1s, box-shadow 0.1s;
    cursor: pointer;
  }

  .omni-string-line.lit {
    box-shadow: 0 0 8px var(--accent);
  }

  /* ---- SITAR ---- */
  .sitar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    max-width: 900px;
    margin: 0 auto;
  }

  .sitar-desc {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  .sitar-sections { width: 100%; }

  .sitar-section { margin-bottom: 32px; }

  .sitar-section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 14px;
    border-left: 3px solid #c8844a;
    padding-left: 12px;
  }

  .sitar-notes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .sitar-note-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    padding: 14px 20px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: #c8844a;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.08s;
    position: relative;
    overflow: hidden;
  }

  .sitar-note-btn .sitar-sub {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .sitar-note-btn:hover { border-color: #c8844a; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,132,74,0.15); }
  .sitar-note-btn.playing { transform: scale(0.95); background: #1a0e06; border-color: #c8844a; }

  /* ---- DRUMS (existing) ---- */
  .drum-kit {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 700px;
    margin: 0 auto;
  }

  .drum-pad {
    aspect-ratio: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.06s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .drum-pad::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .drum-pad:hover { border-color: var(--accent); transform: scale(1.02); }
  .drum-pad:active, .drum-pad.playing { transform: scale(0.94); border-color: var(--accent); }
  .drum-pad.playing::after { opacity: 0.15; }

  .drum-icon { font-size: 28px; position: relative; z-index: 1; }
  .drum-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }

  .drum-key {
    font-size: 9px;
    color: #444;
    position: absolute;
    top: 8px;
    right: 10px;
    font-family: 'Space Mono', monospace;
  }

  /* Now playing */
  .now-playing {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    padding: 10px 24px;
    color: var(--accent);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.15em;
  }

  .now-playing.visible { opacity: 1; }

  /* Ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid var(--accent);
    pointer-events: none;
    animation: rippleOut 0.6s ease-out forwards;
    z-index: 999;
  }

  @keyframes rippleOut {
    from { width: 0; height: 0; opacity: 0.8; transform: translate(-50%,-50%); }
    to { width: 120px; height: 120px; opacity: 0; transform: translate(-50%,-50%); }
  }
</style>
</head>
<body>

<header>
  <h1>PLAY</h1>
  <p class="subtitle">click anything to hear it</p>
</header>

<!-- Instrument Tabs -->
<div class="instrument-tabs">
  <button class="tab active" onclick="switchInstrument('guitar')"><span class="icon">🎸</span> Guitar</button>
  <button class="tab" onclick="switchInstrument('ukulele')"><span class="icon">🪕</span> Ukulele</button>
  <button class="tab" onclick="switchInstrument('piano')"><span class="icon">🎹</span> Piano</button>
  <button class="tab" onclick="switchInstrument('drums')"><span class="icon">🥁</span> Drums</button>
  <button class="tab" onclick="switchInstrument('omnichord')"><span class="icon">🎵</span> Omnichord</button>
  <button class="tab" onclick="switchInstrument('sitar')"><span class="icon">🪘</span> Sitar</button>
</div>

<!-- Mode controls (guitar/ukulele) -->
<div class="controls" id="strumControls">
  <div class="control-group">
    <span>Mode</span>
    <div class="toggle">
      <button class="toggle-btn active" id="btn-strum" onclick="setMode('strum')">Strum</button>
      <button class="toggle-btn" id="btn-arp" onclick="setMode('arp')">Arpeggio</button>
      <button class="toggle-btn" id="btn-single" onclick="setMode('single')">Single</button>
    </div>
  </div>
</div>

<!-- GUITAR -->
<div class="panel active" id="panel-guitar"></div>

<!-- UKULELE -->
<div class="panel" id="panel-ukulele"></div>

<!-- PIANO -->
<div class="panel" id="panel-piano">
  <div class="piano-wrap">
    <div>
      <div class="piano-section-label" style="margin-bottom:12px;">PLAY INDIVIDUAL NOTES</div>
      <div class="piano-keys" id="pianoKeys"></div>
    </div>
    <div style="width:100%;max-width:800px;">
      <div class="piano-section-label" style="margin-bottom:12px;">PLAY CHORDS</div>
      <div class="piano-chords" id="pianoChords"></div>
    </div>
  </div>
</div>

<!-- OMNICHORD -->
<div class="panel" id="panel-omnichord">
  <div class="omni-wrap">
    <div class="omni-hint">① Pick a chord button &nbsp;→&nbsp; ② Sweep the strumplate</div>
    <div class="omni-layout">
      <div class="omni-chords" id="omniChords"></div>
      <div class="omni-strumplate" id="omniStrumplate">
        <div class="omni-strum-label">STRUMPLATE</div>
        <div class="omni-strum-label omni-strum-sub">sweep up or down</div>
        <div class="omni-strings" id="omniStrings"></div>
      </div>
    </div>
  </div>
</div>

<!-- SITAR -->
<div class="panel" id="panel-sitar">
  <div class="sitar-wrap">
    <div class="sitar-desc">Ragas &amp; scales rooted in Indian classical tuning. Click a note to hear the sitar tone.</div>
    <div class="sitar-sections" id="sitarSections"></div>
  </div>
</div>

<!-- DRUMS -->
<div class="panel" id="panel-drums">
  <div class="drum-kit" id="drumKit"></div>
  <p style="text-align:center;font-size:10px;color:var(--muted);margin-top:20px;letter-spacing:0.15em;">USE KEYBOARD SHORTCUTS SHOWN ON EACH PAD</p>
</div>

<div class="now-playing" id="nowPlaying"></div>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function ensureCtx() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
}

// ===================== AUDIO ENGINE =====================

function playTone(freq, startTime, duration, vol = 0.35, type = 'sawtooth', detune = 5) {
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 3200;

  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq, startTime);
  osc2.detune.setValueAtTime(detune, startTime);

  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.005);
  gain.gain.exponentialRampToValueAtTime(vol * 0.4, startTime + 0.08);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  osc.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(ctx.destination);
  osc.start(startTime); osc.stop(startTime + duration);
  osc2.start(startTime); osc2.stop(startTime + duration);
}

function playPianoTone(freq, startTime, duration, vol = 0.4) {
  // Cleaner piano-like tone using sine + harmonics
  [1, 2, 3, 4].forEach((harmonic, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const v = vol / (harmonic * 1.5);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * harmonic, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(v, startTime + 0.003);
    gain.gain.exponentialRampToValueAtTime(v * 0.3, startTime + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(startTime); osc.stop(startTime + duration);
  });
}

// Drum sounds
function playKick(t) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
  gain.gain.setValueAtTime(1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.5);
}

function playSnare(t) {
  // Noise burst
  const bufSize = ctx.sampleRate * 0.2;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1500;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.8, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + 0.25);

  // Body tone
  const osc = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc.frequency.value = 220;
  g2.gain.setValueAtTime(0.3, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(g2); g2.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.15);
}

function playHihat(t, open = false) {
  const bufSize = ctx.sampleRate * (open ? 0.4 : 0.08);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 7000;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + (open ? 0.4 : 0.08));
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + (open ? 0.5 : 0.1));
}

function playTom(t, freq = 120) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.2);
  gain.gain.setValueAtTime(0.7, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.4);
}

function playCymbal(t) {
  const bufSize = ctx.sampleRate * 0.8;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 5000;
  filter.Q.value = 0.5;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + 1);
}

function playClap(t) {
  [0, 0.01, 0.02].forEach(offset => {
    const bufSize = ctx.sampleRate * 0.1;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1200;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.6, t + offset);
    gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.1);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start(t + offset); src.stop(t + offset + 0.15);
  });
}

function playRide(t) {
  const bufSize = ctx.sampleRate * 0.6;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 4000;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + 0.7);
}

// ===================== PLAYBACK =====================
let currentMode = 'strum';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
}

function fretToFreq(openStrings, stringIdx, fret) {
  return openStrings[stringIdx] * Math.pow(2, fret / 12);
}

function playStringChord(chord, openStrings, el) {
  ensureCtx();
  const now = ctx.currentTime;
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 300);

  const active = chord.frets.map((f, i) => ({ f, i })).filter(x => x.f !== -1);

  if (currentMode === 'strum') {
    active.forEach(({ f, i }, idx) => {
      playTone(fretToFreq(openStrings, i, f), now + idx * 0.025, 2.0, 0.26);
    });
  } else if (currentMode === 'arp') {
    active.forEach(({ f, i }, idx) => {
      playTone(fretToFreq(openStrings, i, f), now + idx * 0.13, 1.8, 0.3);
    });
  } else {
    const first = active[0];
    if (first) playTone(fretToFreq(openStrings, first.i, first.f), now, 1.5, 0.42);
  }
  showNowPlaying(chord.name);
}

function playPianoChord(chord, el) {
  ensureCtx();
  const now = ctx.currentTime;
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 400);
  chord.notes.forEach((note, i) => {
    const freq = NOTE_FREQS[note];
    if (freq) playPianoTone(freq, now + i * 0.02, 2.5, 0.35);
  });
  showNowPlaying(chord.name);
}

function playPianoNote(note, el) {
  ensureCtx();
  const freq = NOTE_FREQS[note];
  if (!freq) return;
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 300);
  playPianoTone(freq, ctx.currentTime, 1.5, 0.4);
  showNowPlaying(note);
}

// ===================== FRETBOARD BUILDER =====================
function buildFretboard(frets, labels) {
  const mini = document.createElement('div');
  mini.className = 'fretboard';
  frets.forEach((fret, i) => {
    const row = document.createElement('div');
    row.className = 'string-row';
    const lbl = document.createElement('span');
    lbl.className = 'string-label';
    lbl.textContent = labels[i];
    row.appendChild(lbl);
    if (fret === -1) {
      const dot = document.createElement('div');
      dot.className = 'fret-dot muted';
      const x = document.createElement('span');
      x.className = 'muted-x'; x.textContent = '×';
      dot.appendChild(x); row.appendChild(dot);
    } else {
      const maxFret = Math.max(...frets.filter(f => f !== -1)) || 1;
      for (let f = 0; f <= Math.min(maxFret, 5); f++) {
        const dot = document.createElement('div');
        dot.className = 'fret-dot' + (fret === f && fret > 0 ? ' pressed' : fret === 0 && f === 0 ? ' open' : '');
        row.appendChild(dot);
      }
    }
    mini.appendChild(row);
  });
  return mini;
}

let selectedOmniChord = null;

function playOmniTone(freq, t, vol = 0.22) {
  // Omnichord has a warm, slightly electric harp-like tone
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2800;
  osc.type = 'sine';
  osc2.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);
  osc2.frequency.setValueAtTime(freq * 2, t);
  osc2.detune.setValueAtTime(3, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.008);
  gain.gain.exponentialRampToValueAtTime(vol * 0.5, t + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
  osc.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 2.5);
  osc2.start(t); osc2.stop(t + 2.5);
}

  showNowPlaying(selectedOmniChord.name);
}

// ===================== SITAR DATA =====================
// Sitar uses 7 main strings tuned roughly to Sa Re Ga Ma Pa Dha Ni
// We'll present ragas as sets of notes the user can pluck individually
const SITAR_BASE = 261.63; // Sa = C4

// Sitar note frequencies (just intonation-ish)
const SITAR_NOTES = {
  'Sa':  261.63,
  'Re♭': 277.18,
  'Re':  293.66,
  'Ga♭': 311.13,
  'Ga':  329.63,
  'Ma':  349.23,
  'Ma#': 369.99,
  'Pa':  392.00,
  'Dha♭':415.30,
  'Dha': 440.00,
  'Ni♭': 466.16,
  'Ni':  493.88,
  "Sa'": 523.25,
};

const RAGAS = {
  'Raga Yaman (Kalyan)': {
    notes: ['Sa','Re','Ga','Ma#','Pa','Dha','Ni',"Sa'"],
    desc: 'Evening raga — serene, romantic',
  },
  'Raga Bhairav': {
    notes: ['Sa','Re♭','Ga','Ma','Pa','Dha♭','Ni',"Sa'"],
    desc: 'Morning raga — devotional, majestic',
  },
  'Raga Bhairavi': {
    notes: ['Sa','Re♭','Ga♭','Ma','Pa','Dha♭','Ni♭',"Sa'"],
    desc: 'All-time raga — melancholic, farewell',
  },
  'Raga Kafi': {
    notes: ['Sa','Re','Ga♭','Ma','Pa','Dha','Ni♭',"Sa'"],
    desc: 'Playful raga — light, spring mood',
  },
  'Pentatonic (Sa)': {
    notes: ['Sa','Re','Ga','Pa','Dha',"Sa'"],
    desc: 'Universal scale — meditative',
  },
};

function playSitarNote(freq, t) {
  // Sitar: buzzy, metallic, with prominent jawari (buzz) and long sustain
  const harmonics = [1, 2, 3, 4, 5, 6, 7];
  const vols =      [0.35, 0.18, 0.12, 0.08, 0.05, 0.03, 0.02];
  harmonics.forEach((h, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = i === 0 ? 'sawtooth' : 'sine';
    osc.frequency.setValueAtTime(freq * h, t);
    // Slight pitch wobble for sympathetic string feel
    if (i < 2) {
      osc.frequency.setValueAtTime(freq * h * 1.002, t + 0.01);
      osc.frequency.exponentialRampToValueAtTime(freq * h, t + 0.08);
    }
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vols[i], t + 0.003);
    gain.gain.exponentialRampToValueAtTime(vols[i] * 0.6, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 4);
  });

  // Sympathetic string resonance (gentle drone-like shimmer)
  ['Sa','Pa','Sa'].forEach((n, i) => {
    const f = SITAR_NOTES[n] * (i === 2 ? 2 : 1);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.02, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 3);
  });
}

// ===================== RENDER OMNICHORD =====================
function renderOmnichord() {
  // Chord buttons
  const chordsEl = document.getElementById('omniChords');
  OMNI_CHORDS.forEach(chord => {
    const btn = document.createElement('button');
    btn.className = 'omni-chord-btn';
    btn.innerHTML = `${chord.name}<span class="sub">${chord.type}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.omni-chord-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedOmniChord = chord;
      // Auto-strum once on select
      ensureCtx();
      strumOmniStrings();
    });
    chordsEl.appendChild(btn);
  });

  // Strumplate strings
  const stringsEl = document.getElementById('omniStrings');
  const colors = ['#c8844a','#d4944a','#c8a44a','#b8c84a','#74c84a','#4ac8a4','#4a94c8','#6474c8','#9464c8','#c864a4','#c84a6a'];
  for (let i = 0; i < 11; i++) {
    const line = document.createElement('div');
    line.className = 'omni-string-line';
    line.style.background = colors[i % colors.length];
    line.style.opacity = '0.5';
    omniStringEls.push(line);
    stringsEl.appendChild(line);
  }

  // Strumplate interaction — mouse/touch sweep
  const plate = document.getElementById('omniStrumplate');
  let lastStrumY = null;
  let strumCooldown = false;

  function doStrum(y) {
    if (strumCooldown) return;
    strumCooldown = true;
    setTimeout(() => strumCooldown = false, 180);
    strumOmniStrings();
  }

  plate.addEventListener('mousedown', (e) => { omniIsStruming = true; lastStrumY = e.clientY; doStrum(e.clientY); });
  plate.addEventListener('mousemove', (e) => {
    if (!omniIsStruming) return;
    if (Math.abs(e.clientY - lastStrumY) > 18) { lastStrumY = e.clientY; doStrum(e.clientY); }
  });
  plate.addEventListener('mouseup', () => omniIsStruming = false);
  plate.addEventListener('mouseleave', () => omniIsStruming = false);
  plate.addEventListener('touchstart', (e) => { omniIsStruming = true; lastStrumY = e.touches[0].clientY; doStrum(lastStrumY); e.preventDefault(); }, { passive: false });
  plate.addEventListener('touchmove', (e) => {
    if (!omniIsStruming) return;
    const y = e.touches[0].clientY;
    if (Math.abs(y - lastStrumY) > 18) { lastStrumY = y; doStrum(y); }
    e.preventDefault();
  }, { passive: false });
  plate.addEventListener('touchend', () => omniIsStruming = false);
}

// ===================== RENDER SITAR =====================
function renderSitar() {
  const sectionsEl = document.getElementById('sitarSections');
  Object.entries(RAGAS).forEach(([ragaName, raga]) => {
    const section = document.createElement('div');
    section.className = 'sitar-section';
    const label = document.createElement('div');
    label.className = 'sitar-section-label';
    label.textContent = ragaName;
    const desc = document.createElement('div');
    desc.style.cssText = 'font-size:9px;color:var(--muted);letter-spacing:0.15em;margin-bottom:12px;padding-left:15px;text-transform:uppercase;';
    desc.textContent = raga.desc;
    section.appendChild(label);
    section.appendChild(desc);
    const notesEl = document.createElement('div');
    notesEl.className = 'sitar-notes';
    raga.notes.forEach(noteName => {
      const freq = SITAR_NOTES[noteName];
      if (!freq) return;
      const btn = document.createElement('button');
      btn.className = 'sitar-note-btn';
      btn.innerHTML = `${noteName}<span class="sitar-sub">${Math.round(freq)} Hz</span>`;
      btn.addEventListener('click', (e) => {
        ensureCtx();
        playSitarNote(freq, ctx.currentTime);
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 400);
        showNowPlaying(noteName);
        makeRipple(e);
      });
      notesEl.appendChild(btn);
    });
    section.appendChild(notesEl);
    sectionsEl.appendChild(section);
  });
}

// ===================== INSTRUMENT SWITCHER =====================
let currentInstrument = 'guitar';

const ALL_INSTRUMENTS = ['guitar','ukulele','piano','drums','omnichord','sitar'];

function switchInstrument(name) {
  currentInstrument = name;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ALL_INSTRUMENTS[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('strumControls').style.display = (name === 'guitar' || name === 'ukulele') ? 'flex' : 'none';
}
